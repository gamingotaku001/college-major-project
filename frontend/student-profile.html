<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Student Profile
    </title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="./css/student-profile.css"
    >

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

<div class="student-page">

    <!-- BACK BUTTON -->

    <button
        class="back-btn"
        onclick="goHome()"
    >

        <i class="fa-solid fa-arrow-left"></i>

        Back To Home

    </button>

    <!-- TOP LAYOUT -->

    <div class="top-layout">

        <!-- PROFILE CARD -->

        <div class="student-card">

            <div class="student-avatar">

                <i class="fa-solid fa-user"></i>

            </div>

            <h1 id="studentName">

                Student Name

            </h1>

            <p class="student-role">

                Student Profile

            </p>

            <div class="student-details">

                <div class="detail-box">

                    <span>Class</span>

                    <p id="studentClass">
                        -
                    </p>

                </div>

                <div class="detail-box">

                    <span>Roll Number</span>

                    <p id="studentRoll">
                        -
                    </p>

                </div>

                <div class="detail-box">

                    <span>Email</span>

                    <p id="studentEmail">
                        -
                    </p>

                </div>

                <div class="detail-box">

                    <span>Parent Name</span>

                    <p id="parentName">
                        -
                    </p>

                </div>

                <div class="detail-box">

                    <span>Parent Phone</span>

                    <p id="parentPhone">
                        -
                    </p>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-side">

            <!-- ATTENDANCE -->

            <div class="attendance-card">

                <h2>
                    Attendance
                </h2>

                <div class="circle">

                    <span id="attendancePercent">

                        0%

                    </span>

                </div>

                <div class="attendance-stats">

                    <div>

                        <h3 id="presentCount">
                            0
                        </h3>

                        <p>
                            Present
                        </p>

                    </div>

                    <div>

                        <h3 id="absentCount">
                            0
                        </h3>

                        <p>
                            Absent
                        </p>

                    </div>

                </div>

            </div>

            <!-- HISTORY -->

            <div class="history-card">

                <h2>
                    Attendance History
                </h2>

                <div id="attendanceHistory">

                    <div class="history-item">

                        No attendance records yet

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- JS -->

<script src="./js/student-profile.js"></script>

</body>

</html>
